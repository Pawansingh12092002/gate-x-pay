<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GateXPay Navbar Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #06090f; font-family: 'DM Sans', sans-serif; min-height: 200vh; }
a { text-decoration: none; color: inherit; }

:root {
  --nav-bg: rgba(10,18,40,0.92);
  --nav-border: rgba(59,130,246,0.12);
  --nav-blue: #22aaff;
  --nav-cyan: #00d4ff;
  --nav-white: #ffffff;
  --nav-muted: #8ca0be;
  --nav-hover-bg: rgba(34,170,255,0.08);
  --nav-dropdown-bg: #0b1730;
  --nav-height: 72px;
  --ease: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

/* ── SHELL ── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: var(--nav-height);
  background: var(--nav-bg);
  backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--nav-border);
  transition: var(--ease);
}
.navbar.scrolled {
  background: rgba(6,13,31,0.97);
  box-shadow: 0 4px 32px rgba(0,0,0,0.4);
}

/* ── INNER ── */
.nav-inner {
  max-width: 1400px; margin: 0 auto; height: 100%;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; gap: 32px;
}

/* ── LOGO ── */
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 52px; height: 52px; flex-shrink: 0; }
.logo-copy { display: flex; flex-direction: column; gap: 3px; line-height: 1; }
.logo-name { font-size: 17px; font-weight: 700; color: var(--nav-white); letter-spacing: 0.01em; }
.logo-name .x { color: var(--nav-cyan); }
.logo-tag  { font-size: 8px; font-weight: 600; letter-spacing: 0.2em; color: var(--nav-muted); text-transform: uppercase; }

/* ── LINKS ── */
.nav-links { display: flex; align-items: center; gap: 4px; list-style: none; flex: 1; justify-content: center; }
.nav-item  { position: relative; }

.nav-link {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 8px 16px; border-radius: 8px;
  font-size: 15px; font-weight: 500; color: var(--nav-muted);
  background: transparent; border: none; cursor: pointer;
  transition: var(--ease); white-space: nowrap; font-family: inherit;
}
.nav-link:hover, .nav-link.active { color: var(--nav-white); background: var(--nav-hover-bg); }
.nav-link.active {
  text-decoration: underline; text-underline-offset: 4px;
  text-decoration-color: var(--nav-blue); text-decoration-thickness: 2px;
  background: transparent;
}

/* chevron */
.chevron {
  width: 14px; height: 14px; display: inline-flex; align-items: center;
  transition: transform 0.22s ease; color: var(--nav-muted); flex-shrink: 0;
}
.nav-item:hover .chevron { transform: rotate(180deg); color: var(--nav-cyan); }

/* dropdown */
.dropdown {
  position: absolute; top: calc(100% + 8px); left: 50%;
  transform: translateX(-50%) translateY(-6px);
  min-width: 220px; background: var(--nav-dropdown-bg);
  border: 1px solid var(--nav-border); border-radius: 14px;
  padding: 8px; opacity: 0; visibility: hidden; pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
}
.nav-item:hover .dropdown {
  opacity: 1; visibility: visible; pointer-events: all;
  transform: translateX(-50%) translateY(0);
}
.dropdown::before {
  content: ''; position: absolute; top: -6px; left: 50%;
  width: 10px; height: 10px; background: var(--nav-dropdown-bg);
  border-left: 1px solid var(--nav-border); border-top: 1px solid var(--nav-border);
  transform: translateX(-50%) rotate(45deg);
}
.dd-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px;
  color: var(--nav-muted); font-size: 14px; font-weight: 500;
  text-decoration: none; transition: var(--ease);
}
.dd-item:hover { background: var(--nav-hover-bg); color: var(--nav-white); }
.dd-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }

/* ── CTA ── */
.cta-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: 100px;
  background: linear-gradient(135deg, #0ea5e9, #22d3ee);
  color: #fff; font-family: inherit; font-size: 14px; font-weight: 700;
  text-decoration: none; border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(14,165,233,0.3);
  transition: var(--ease); flex-shrink: 0; white-space: nowrap;
}
.cta-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(14,165,233,0.48); }
.cta-btn svg { width: 15px; height: 15px; }

/* ── HAMBURGER ── */
.hamburger {
  display: none; flex-direction: column; justify-content: center;
  align-items: center; gap: 5px; width: 40px; height: 40px;
  background: transparent; border: 1px solid var(--nav-border);
  border-radius: 8px; cursor: pointer; padding: 8px; transition: var(--ease);
}
.hamburger:hover { background: var(--nav-hover-bg); }
.bar { width: 20px; height: 1.5px; background: var(--nav-muted); border-radius: 2px; transition: var(--ease); transform-origin: center; }
.hamburger.open .bar:nth-child(1) { transform: translateY(6.5px) rotate(45deg); background: var(--nav-cyan); }
.hamburger.open .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger.open .bar:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); background: var(--nav-cyan); }

/* ── MOBILE MENU ── */
.mobile-menu {
  position: fixed; top: var(--nav-height); left: 0; right: 0;
  background: var(--nav-dropdown-bg); border-bottom: 1px solid var(--nav-border);
  padding: 16px 24px 24px; display: none; flex-direction: column; gap: 4px;
  z-index: 999; animation: slideDown 0.22s ease;
}
.mobile-menu.open { display: flex; }
.mob-link {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  border-radius: 10px; color: var(--nav-muted); font-size: 15px; font-weight: 500;
  text-decoration: none; transition: var(--ease);
}
.mob-link:hover, .mob-link.active { background: var(--nav-hover-bg); color: var(--nav-white); }
.mob-divider { height: 1px; background: var(--nav-border); margin: 8px 0; }
.mob-cta {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 22px; border-radius: 100px;
  background: linear-gradient(135deg, #0ea5e9, #22d3ee);
  color: #fff; font-size: 15px; font-weight: 700; text-decoration: none;
  margin-top: 8px; box-shadow: 0 4px 20px rgba(14,165,233,0.3);
}

@media (max-width: 900px) {
  .nav-links, .cta-btn { display: none; }
  .hamburger { display: flex; }
  .nav-inner { padding: 0 24px; }
}

@keyframes slideDown {
  from { opacity:0; transform:translateY(-8px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="nav-inner">

    <!-- LOGO -->
    <a href="/" class="logo" aria-label="GateXPay home">
      <svg class="logo-mark" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="26" cy="26" r="26" fill="#0a1628"/>
        <circle cx="26" cy="26" r="25" stroke="rgba(34,170,255,0.2)" stroke-width="1"/>
        <path d="M26 10 A16 16 0 1 0 42 26 L34 26" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M20 20 L32 32 M32 20 L20 32" stroke="url(#g2)" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="38" cy="34" r="1.5" fill="#22d3ee" opacity="0.8"/>
        <circle cx="42" cy="34" r="1.5" fill="#22d3ee" opacity="0.5"/>
        <circle cx="38" cy="38" r="1.5" fill="#22d3ee" opacity="0.5"/>
        <defs>
          <linearGradient id="g1" x1="10" y1="10" x2="42" y2="26" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#22aaff"/><stop offset="100%" stop-color="#00d4ff"/>
          </linearGradient>
          <linearGradient id="g2" x1="20" y1="20" x2="32" y2="32" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.7"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-copy">
        <span class="logo-name">gate <span class="x">X</span> pay</span>
        <span class="logo-tag">CONNECT · PAY · INNOVATE</span>
      </div>
    </a>

    <!-- DESKTOP LINKS -->
    <ul class="nav-links">
      <li class="nav-item">
        <a href="/" class="nav-link active">Home</a>
      </li>
      <li class="nav-item">
        <button class="nav-link">
          Services
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="dropdown">
          <a href="/services/gateway" class="dd-item"><span class="dd-icon">💳</span> Payment Gateway</a>
          <a href="/services/tokenization" class="dd-item"><span class="dd-icon">🔐</span> Tokenization</a>
          <a href="/services/fraud" class="dd-item"><span class="dd-icon">🛡️</span> Fraud Detection</a>
          <a href="/services/analytics" class="dd-item"><span class="dd-icon">📊</span> Analytics</a>
        </div>
      </li>
      <li class="nav-item">
        <a href="/about" class="nav-link">About Us</a>
      </li>
      <li class="nav-item">
        <a href="/blog" class="nav-link">Blog</a>
      </li>
    </ul>

    <!-- CTA -->
    <a href="/contact" class="cta-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2z"/>
      </svg>
      Contact Us
    </a>

    <!-- HAMBURGER -->
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
  </div>
</header>

<!-- MOBILE MENU -->
<nav class="mobile-menu" id="mobile-menu">
  <a href="/" class="mob-link active">Home</a>
  <a href="/services" class="mob-link">Services ›</a>
  <a href="/services/gateway" class="mob-link" style="padding-left:32px;font-size:13px">💳 Payment Gateway</a>
  <a href="/services/tokenization" class="mob-link" style="padding-left:32px;font-size:13px">🔐 Tokenization</a>
  <a href="/services/fraud" class="mob-link" style="padding-left:32px;font-size:13px">🛡️ Fraud Detection</a>
  <a href="/services/analytics" class="mob-link" style="padding-left:32px;font-size:13px">📊 Analytics</a>
  <a href="/about" class="mob-link">About Us</a>
  <a href="/blog" class="mob-link">Blog</a>
  <div class="mob-divider"></div>
  <a href="/contact" class="mob-cta">📞 Contact Us</a>
</nav>

<script>
  const navbar    = document.getElementById('navbar');
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobile-menu');

  // scroll shadow
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', window.scrollY > 12);
  }, { passive: true });

  // hamburger toggle
  hamburger.addEventListener('click', () => {
    const open = hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', open);
  });

  // close on resize to desktop
  window.addEventListener('resize', () => {
    if (window.innerWidth > 900) {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
    }
  });
</script>
</body>
</html>
